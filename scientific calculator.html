<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<style>
body{
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#4e54c8,#8f94fb);
    font-family:Arial,sans-serif;
}

.calculator{
    background:#222;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

#display{
    width:100%;
    height:60px;
    font-size:25px;
    margin-bottom:15px;
    text-align:right;
    padding-right:10px;
    border:none;
    border-radius:10px;
    background:#fff;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(5,70px);
    gap:10px;
}

button{
    height:60px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#444;
    color:white;
    transition:0.2s;
}

button:hover{
    background:#666;
}

.equal{
    background:#28a745;
}

.clear{
    background:#dc3545;
}
</style>

</head>
<body>

<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('/')">/</button>
<button onclick="sin()">sin</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('*')">*</button>
<button onclick="cos()">cos</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('-')">-</button>
<button onclick="tan()">tan</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="append('+')">+</button>
<button onclick="sqrt()">√</button>
<button onclick="power()">x²</button>

<button onclick="log()">log</button>
<button onclick="ln()">ln</button>
<button onclick="pi()">π</button>
<button onclick="e()">e</button>
<button class="clear" onclick="clearDisplay()">C</button>

<button class="equal" style="grid-column:span 5;" onclick="calculate()">=</button>

</div>

</div>

<script>

let display=document.getElementById("display");

function append(value){
    display.value+=value;
}

function clearDisplay(){
    display.value="";
}

function calculate(){
    try{
        display.value=eval(display.value);
    }
    catch{
        display.value="Error";
    }
}

function sin(){
    display.value=Math.sin(eval(display.value)*Math.PI/180);
}

function cos(){
    display.value=Math.cos(eval(display.value)*Math.PI/180);
}

function tan(){
    display.value=Math.tan(eval(display.value)*Math.PI/180);
}

function sqrt(){
    display.value=Math.sqrt(eval(display.value));
}

function power(){
    display.value=Math.pow(eval(display.value),2);
}

function log(){
    display.value=Math.log10(eval(display.value));
}

function ln(){
    display.value=Math.log(eval(display.value));
}

function pi(){
    display.value+=Math.PI;
}

function e(){
    display.value+=Math.E;
}

</script>

</body>
</html>
